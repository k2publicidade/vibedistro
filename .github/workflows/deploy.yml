name: Deploy

# Automated production deploy pipeline.
#
# Triggers:
#   - push to main (after CI passes via branch protection, or manually via workflow_dispatch)
#   - manual dispatch with optional "skip_seed" / "skip_migrations" inputs
#
# Required repository secrets:
#   DATABASE_URL            - Supabase Session connection string (port 5432, password url-encoded)
#   VERCEL_TOKEN            - Personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID           - `vercel link` output (vercel.json > orgId)
#   VERCEL_PROJECT_ID       - `vercel link` output (vercel.json > projectId)
#   RENDER_API_KEY          - API key from dashboard.render.com/u/settings#api-keys
#   RENDER_API_SERVICE_ID   - service id for vibedistro-api (srv-...)
#
# Required repository variables (Settings > Secrets and variables > Actions > Variables):
#   PROD_WEB_URL            - e.g. https://vibedistro.vercel.app
#   PROD_API_URL            - e.g. https://vibedistro-api.onrender.com

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip prisma db push'
        required: false
        default: 'false'
      skip_seed:
        description: 'Skip prisma db seed'
        required: false
        default: 'false'
      skip_api:
        description: 'Skip Render API deploy'
        required: false
        default: 'false'
      skip_web:
        description: 'Skip Vercel web deploy'
        required: false
        default: 'false'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ---------------------------------------------------------------
  # 1) Database — push schema + seed (idempotent)
  # ---------------------------------------------------------------
  migrate:
    name: DB migrate + seed
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_migrations != 'true' }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Prisma generate
        run: npx -w packages/database prisma generate

      - name: Prisma db push (Supabase)
        run: npx -w packages/database prisma db push --skip-generate

      - name: Prisma seed
        if: ${{ inputs.skip_seed != 'true' }}
        run: npx -w packages/database prisma db seed
        continue-on-error: true   # seed is idempotent-ish; don't fail deploy on re-seed errors

  # ---------------------------------------------------------------
  # 2) API — trigger Render deploy + wait for live
  # ---------------------------------------------------------------
  deploy-api:
    name: Deploy API (Render)
    runs-on: ubuntu-latest
    needs: [migrate]
    if: ${{ always() && needs.migrate.result != 'failure' && inputs.skip_api != 'true' }}
    steps:
      - name: Trigger Render deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
        run: |
          echo "Triggering deploy for service $RENDER_API_SERVICE_ID"
          RESPONSE=$(curl -sS -X POST \
            "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "$RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$DEPLOY_ID" = "null" ] || [ -z "$DEPLOY_ID" ]; then
            echo "Failed to trigger deploy"; exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Render deploy to finish
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -sS \
              "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.status')
            echo "[$i/60] status=$STATUS"
            case "$STATUS" in
              live) echo "API deploy live"; exit 0 ;;
              build_failed|update_failed|canceled|deactivated) echo "Deploy failed"; exit 1 ;;
              *) sleep 20 ;;
            esac
          done
          echo "Timed out waiting for deploy"; exit 1

  # ---------------------------------------------------------------
  # 3) Web — Vercel production deploy
  # ---------------------------------------------------------------
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    needs: [migrate]
    if: ${{ always() && needs.migrate.result != 'failure' && inputs.skip_web != 'true' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build (Vercel)
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to Vercel
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ---------------------------------------------------------------
  # 4) Smoke test — verify both endpoints
  # ---------------------------------------------------------------
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: ${{ always() && (needs.deploy-api.result == 'success' || needs.deploy-web.result == 'success') }}
    steps:
      - name: Check API health
        if: ${{ vars.PROD_API_URL != '' }}
        run: |
          URL="${{ vars.PROD_API_URL }}/api/v1/health"
          echo "GET $URL"
          for i in $(seq 1 10); do
            CODE=$(curl -sS -o /tmp/body -w '%{http_code}' "$URL" || echo "000")
            echo "[$i/10] $CODE"
            if [ "$CODE" = "200" ]; then cat /tmp/body; exit 0; fi
            sleep 15
          done
          echo "API health check failed"; cat /tmp/body; exit 1

      - name: Check Web login page
        if: ${{ vars.PROD_WEB_URL != '' }}
        run: |
          URL="${{ vars.PROD_WEB_URL }}/login"
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' "$URL")
          echo "Web /login -> $CODE"
          [ "$CODE" = "200" ] || exit 1
