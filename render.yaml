# Render Blueprint - VibeDistro demo online
# Docs: https://render.com/docs/blueprint-spec
# Uso: Render Dashboard -> New -> Blueprint -> conectar repo k2publicidade/vibedistro
#
# Este blueprint sobe o painel completo para demonstracao:
# - web Next.js
# - API NestJS
# - Postgres
# - Render Key Value (Redis/Valkey compativel)
#
# Para uma demo, storage fica local/efemero. Para producao real, trocar para R2/S3.

services:
  - type: keyvalue
    name: vibedistro-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: vibedistro-api
    runtime: docker
    repo: https://github.com/k2publicidade/vibedistro
    branch: main
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_URL
        value: https://vibedistro-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: vibedistro-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vibedistro-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: ALLOWED_ORIGINS
        value: https://vibedistro-web.onrender.com
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_BUCKET
        value: vibedistro-demo
      - key: REVELATOR_ENABLED
        value: "true"
      - key: REVELATOR_ENVIRONMENT
        value: sandbox
      - key: REVELATOR_API_URL
        value: https://api.revelator.com
      - key: REVELATOR_PARTNER_API_KEY
        value: 53ad6a23-5436-4461-a523-0d3b90b82701
      - key: REVELATOR_PARTNER_USER_ID
        value: XASKz2yXy8VBFz8Oe8Adlz1Vl3Dt4k
      - key: REVELATOR_ENTERPRISE_ID
        value: "893945"
      - key: REVELATOR_WEBHOOK_SECRET
        generateValue: true
      - key: REVELATOR_WHITE_LABEL_URL
        sync: false

  - type: web
    name: vibedistro-web
    runtime: docker
    repo: https://github.com/k2publicidade/vibedistro
    branch: main
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://vibedistro-api.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://vibedistro-web.onrender.com
      - key: NEXT_PUBLIC_PROVIDER_ENV
        value: sandbox

databases:
  - name: vibedistro-db
    plan: free
    region: oregon
    databaseName: vibedistro
    user: vibedistro
    postgresMajorVersion: "17"
